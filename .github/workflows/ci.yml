name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          ls -la MacMeetingCam.xcodeproj/

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "MacMeetingCam (No Extension)" \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -clonedSourcePackagesDirPath .spm-cache \
            | xcpretty || true
          # Verify build succeeded
          xcodebuild build-for-testing \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -clonedSourcePackagesDirPath .spm-cache \
            -quiet

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -only-testing:MacMeetingCamTests \
            -resultBundlePath .build/results.xcresult \
            -enableCodeCoverage YES \
            -clonedSourcePackagesDirPath .spm-cache \
            2>&1 | tee /tmp/unit-test-output.log | grep -E "(Test Suite|Executed|error:)" || true
          # Check for test failures
          grep "Executed" /tmp/unit-test-output.log | grep -q "0 failures" || exit 1

      - name: Run Integration Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -only-testing:MacMeetingCamIntegrationTests \
            -clonedSourcePackagesDirPath .spm-cache \
            2>&1 | tee /tmp/integration-test-output.log | grep -E "(Test Suite|Executed|error:)" || true
          grep "Executed" /tmp/integration-test-output.log | grep -q "0 failures" || exit 1

      - name: Run E2E Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -only-testing:MacMeetingCamE2ETests \
            -clonedSourcePackagesDirPath .spm-cache \
            2>&1 | tee /tmp/e2e-test-output.log | grep -E "(Test Suite|Executed|error:)" || true
          grep "Executed" /tmp/e2e-test-output.log | grep -q "0 failures" || exit 1

      - name: Run Performance Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -only-testing:MacMeetingCamPerformanceTests \
            -clonedSourcePackagesDirPath .spm-cache \
            2>&1 | tee /tmp/perf-test-output.log | grep -E "(Test Suite|Executed|error:)" || true
          grep "Executed" /tmp/perf-test-output.log | grep -q "0 failures" || exit 1

      - name: Check Coverage
        if: always()
        run: |
          if [ -d ".build/results.xcresult" ]; then
            ./Scripts/check-coverage.sh .build/results.xcresult 90
          else
            echo "No result bundle found — skipping coverage check"
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Tests/coverage-report.txt
          if-no-files-found: ignore

      - name: Upload Snapshot Failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: Tests/SnapshotFailures/
          if-no-files-found: ignore
