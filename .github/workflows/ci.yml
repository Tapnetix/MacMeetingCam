name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          ls -la MacMeetingCam.xcodeproj/

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "MacMeetingCam (No Extension)" \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -clonedSourcePackagesDirPath .spm-cache \
            -quiet

      - name: Run All Tests with Coverage
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "MacMeetingCam (No Extension)" \
            -destination "platform=macOS" \
            -resultBundlePath .build/results.xcresult \
            -enableCodeCoverage YES \
            -clonedSourcePackagesDirPath .spm-cache \
            2>&1 | tee /tmp/test-output.log | grep -E "(Test Suite 'All|Executed|error:)" || true
          # Verify no unexpected failures
          LAST_EXECUTED=$(grep "Executed" /tmp/test-output.log | tail -1)
          echo "$LAST_EXECUTED"
          echo "$LAST_EXECUTED" | grep -q "0 failures" || {
            echo "Tests had failures. Full output:"
            grep -E "(failed|error:)" /tmp/test-output.log
            exit 1
          }

      - name: Check Coverage
        if: always()
        run: |
          if [ -d ".build/results.xcresult" ]; then
            ./Scripts/check-coverage.sh .build/results.xcresult 40
          else
            echo "No result bundle found — skipping coverage check"
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Tests/coverage-report.txt
          if-no-files-found: ignore

      - name: Upload Snapshot Failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: Tests/SnapshotFailures/
          if-no-files-found: ignore
